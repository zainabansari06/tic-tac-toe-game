<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        background-color: #58545f;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
      }
      .grid-box {
        flex-grow: 0;
        height: 300px;
        width: 300px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        position: relative;
        cursor: pointer;
      }
      .grid-box-background {
        height: 291px;
        width: 300px;
        background-color: #282136;
        position: absolute;
      }
      .grids {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        font-family: monospace;
        color: rgb(212, 208, 208);
        background-color: #58545f;
        overflow: hidden;
        line-height: 0;
      }
      .game-heading {
        color: rgb(235, 235, 235);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      button {
        height: 3rem;
        width: 8rem;
        font-size: 20px;
        font-family: monospace;
        color: rgb(56, 56, 56);
        border-radius: 20px;
        cursor: pointer;
        background-color: #b9a1a1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="game-heading">Tic Tac Toe game</h1>
      <div class="grid-box-background"></div>
      <div class="grid-box">
        <div id="grid-1" class="grids"></div>
        <div id="grid-2" class="grids"></div>
        <div id="grid-3" class="grids"></div>
        <div id="grid-4" class="grids"></div>
        <div id="grid-5" class="grids"></div>
        <div id="grid-6" class="grids"></div>
        <div id="grid-7" class="grids"></div>
        <div id="grid-8" class="grids"></div>
        <div id="grid-9" class="grids"></div>
      </div>
      <div class="box">
        <div>
          <button id="reset-button">reset</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
